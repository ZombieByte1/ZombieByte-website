     Detects browser language, falls back to EN.
     User preference saved in localStorage.

<script>
/* ── Dynamic Latest Posts for Homepage ── */
(function(){
  function getLang(){ return window.getLang ? window.getLang() : 'en'; }

  function renderLatest(posts, lang){
    var rm = lang==='es' ? 'LEER MÁS »' : 'READ MORE »';
    return posts.slice(0,3).map(function(p){
      return '<article class="blog-post">'
        + '<div class="blog-post-header">'
        +   '<span class="blog-post-title">' + (p['title_'+lang]||p.title_en) + '</span>'
        +   '<span class="blog-post-date">'  + (p['date_'+lang] ||p.date_en)  + '</span>'
        + '</div>'
        + '<div class="blog-post-body">'
        +   '<img class="blog-post-img" src="' + p.thumbnail + '" alt="' + (p['title_'+lang]||p.title_en) + '">'
        +   '<div class="blog-post-text">'
        +     '<p>' + (p['excerpt_'+lang]||p.excerpt_en) + '</p>'
        +     '<a href="post.html?id=' + p.id + '" class="read-more">' + rm + '</a>'
        +   '</div>'
        + '</div>'
        + '</article>';
    }).join('');
  }

  var cachedPosts = [];

  function render(lang){
    if(!cachedPosts.length) return;
    document.getElementById('latest-posts-container').innerHTML = renderLatest(cachedPosts, lang);
  }

  /* Hook into the shared language switcher so posts re-render on toggle */
  var prevOnLangChange = window.onLangChange;
  window.onLangChange = function(lang){
    if(prevOnLangChange) prevOnLangChange(lang);
    render(lang);
  };

  document.addEventListener('DOMContentLoaded', function(){
    fetch('posts.json')
      .then(function(r){ return r.json(); })
      .then(function(data){
        cachedPosts = data.posts;
        render(getLang());
      })
      .catch(function(){
        document.getElementById('latest-posts-container').innerHTML =
          '<p class="error-msg">&#9760; Could not load posts. Make sure posts.json is uploaded.</p>';
      });
  });
}());
</script>
