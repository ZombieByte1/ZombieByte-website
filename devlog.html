function loadComponent(id, file, callback) {
    fetch(file)
        .then(r => r.text())
        .then(html => {
            document.getElementById(id).innerHTML = html;
            if (callback) callback();
        });
}

    initI18n();
});
</script>

    function applyLang(lang) {
        // Swap all translated elements
        document.querySelectorAll("[data-i18n]").forEach(function(el) {
            var key = el.getAttribute("data-i18n");
            if (T[lang] && T[lang][key] !== undefined) {
                el.innerHTML = T[lang][key];
            }
        });
        // Highlight active buttons (there are two pairs: desktop + mobile)
        ["en","es"].forEach(function(l) {
            var d = document.getElementById("btn-" + l + "-d");
            var m = document.getElementById("btn-" + l + "-m");
            if (d) d.classList.toggle("active", l === lang);
            if (m) m.classList.toggle("active", l === lang);
        });
        // Persist + set html lang attribute
        try { localStorage.setItem("zb-lang", lang); } catch(e) {}
        document.documentElement.lang = lang;
    }

    // Expose globally so onclick works
    window.setLang = applyLang;

    // Auto-detect on load
    document.addEventListener("DOMContentLoaded", function() {
        var saved   = null;
        try { saved = localStorage.getItem("zb-lang"); } catch(e) {}
        var browser = (navigator.language || navigator.userLanguage || "en").toLowerCase();

<script>
(function () {
    var POSTS_PER_PAGE = 5;
    var allPosts   = [];
    var filtered   = [];
    var currentPage = 1;
    var activeTag   = null;

    /* ── helpers ─────────────────────────────────────── */
    function getLang() {
        return document.documentElement.lang === 'es' ? 'es' : 'en';
    }

    function t(post, field) {
        var lang = getLang();
        if (post[field + '_' + lang]) return post[field + '_' + lang];
        if (post[field + '_en'])      return post[field + '_en'];
        if (post[field])              return post[field];
        return '';
    }

    /* ── render one card ─────────────────────────────── */
    function renderCard(p) {
        var tags = (p.tags || []).map(function (tag) {
            return '<span class="post-tag" data-tag="' + tag + '">' + tag + '</span>';
        }).join('');

        return (
            '<article class="blog-post">' +
                '<div class="blog-post-header">' +
                    '<span class="blog-post-title">' + t(p, 'title') + '</span>' +
                    '<span class="blog-post-date">' + (p.date_en || p.date || '') + '</span>' +
                '</div>' +
                '<div class="blog-post-body">' +
                    (p.thumbnail
                        ? '<img class="blog-post-img" src="' + p.thumbnail + '" alt="' + t(p, 'title') + '">'
                        : '') +
                    '<div class="blog-post-text">' +
                        '<p>' + t(p, 'excerpt') + '</p>' +
                        (tags ? '<div class="post-tags">' + tags + '</div>' : '') +
                        '<a href="post.html?id=' + p.id + '" class="read-more" data-i18n="read_more">READ MORE &raquo;</a>' +
                    '</div>' +
                '</div>' +
            '</article>'
        );
    }

    /* ── render all visible cards + pagination ───────── */
    function renderPage() {
        var container = document.getElementById('devlog-posts-container');
        if (!filtered.length) {
            container.innerHTML = '<p class="loading-msg">&#9760; No posts found.</p>';
            document.getElementById('devlog-pagination').innerHTML = '';
            return;
        }

        var total  = Math.ceil(filtered.length / POSTS_PER_PAGE);
        currentPage = Math.min(currentPage, total);
        var start  = (currentPage - 1) * POSTS_PER_PAGE;
        var slice  = filtered.slice(start, start + POSTS_PER_PAGE);

        container.innerHTML = slice.map(renderCard).join('');

        /* re-apply i18n to newly injected nodes */
        if (typeof applyLang === 'function') applyLang(getLang());

        /* tag click inside cards */
        container.querySelectorAll('.post-tag').forEach(function (el) {
            el.addEventListener('click', function () {
                filterByTag(this.dataset.tag);
            });
        });

        /* pagination buttons */
        var pages = '';
        for (var i = 1; i <= total; i++) {
            pages += '<button class="page-btn' + (i === currentPage ? ' active' : '') +
                     '" data-page="' + i + '">' + i + '</button>';
        }
        document.getElementById('devlog-pagination').innerHTML = total > 1 ? pages : '';
        document.querySelectorAll('.page-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                currentPage = parseInt(this.dataset.page);
                renderPage();
                document.getElementById('content').scrollIntoView({ behavior: 'smooth' });
            });
        });
    }

    /* ── filtering logic ─────────────────────────────── */
    function applyFilters() {
        var query = document.getElementById('devlog-search').value.toLowerCase().trim();
        filtered = allPosts.filter(function (p) {
            var matchTag   = !activeTag || (p.tags || []).indexOf(activeTag) !== -1;
            var matchText  = !query ||
                t(p, 'title').toLowerCase().indexOf(query) !== -1 ||
                t(p, 'excerpt').toLowerCase().indexOf(query) !== -1;
            return matchTag && matchText;
        });
        currentPage = 1;
        renderPage();
    }

    function filterByTag(tag) {
        activeTag = (activeTag === tag) ? null : tag;   // toggle
        /* highlight active tag button in the filter bar */
        document.querySelectorAll('#devlog-tags .tag-filter-btn').forEach(function (btn) {
            btn.classList.toggle('active', btn.dataset.tag === activeTag);
        });
        applyFilters();
    }

    /* ── build tag filter bar ────────────────────────── */
    function buildTagBar(posts) {
        var tagSet = {};
        posts.forEach(function (p) {
            (p.tags || []).forEach(function (tag) { tagSet[tag] = true; });
        });
        var tags = Object.keys(tagSet).sort();
        if (!tags.length) return;

        var bar = document.getElementById('devlog-tags');
        bar.innerHTML = tags.map(function (tag) {
            return '<button class="tag-filter-btn" data-tag="' + tag + '">' + tag + '</button>';
        }).join('');

        bar.querySelectorAll('.tag-filter-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                filterByTag(this.dataset.tag);
            });
        });
    }

    /* ── bootstrap ───────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function () {

    document.getElementById('devlog-search').addEventListener('input', applyFilters);

    fetch('posts.json?v=' + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (data) {
            allPosts = (data.posts || []).sort(function (a, b) {
                return new Date(b.date) - new Date(a.date); // newest first
            });
            filtered = allPosts.slice();
            buildTagBar(allPosts);
            renderPage();
        })                                         // ← closes .then(function(data){
        .catch(function () {
            document.getElementById('devlog-posts-container').innerHTML =
                '<p class="loading-msg">&#9760; Could not load posts. Make sure posts.json is uploaded.</p>';
        });

});                                                // ← closes DOMContentLoaded

    /* re-render when the user switches language */
    var prev = window.onLangChange;
    window.onLangChange = function (lang) {
        if (prev) prev(lang);
        renderPage();
    };
}());
</script>
