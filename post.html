<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZombieByte | Devlog</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
    <style>
        /* ── Post page specific styles ── */

        /* Hero thumbnail banner */
        #post-hero {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            display: block;
            border: 3px solid #8a2be2;
            border-bottom: none;
            image-rendering: pixelated;
            margin-bottom: 0;
        }

        /* Post header block (title, date, tags) */
        #post-header {
            background: #0d001a;
            border: 3px solid #8a2be2;
            border-top: none;
            padding: 14px 18px 12px;
            margin-bottom: 18px;
        }

        #post-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #cc44ff;
            text-shadow: 0 0 10px #8a2be2;
            margin: 0 0 10px 0;
            line-height: 1.8;
        }

        #post-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        #post-date {
            font-family: 'VT323', monospace;
            font-size: 16px;
            color: #664488;
        }

        #post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .post-tag {
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            background: #1a003a;
            border: 1px solid #3a0060;
            color: #664488;
            padding: 3px 7px;
        }

        /* Post body content */
        #post-body {
            background: #0d001a;
            border: 2px solid #3a0060;
            padding: 20px 22px;
            margin-bottom: 18px;
            line-height: 1.9;
        }

        #post-body p {
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: #c0a8d8;
            margin: 0 0 12px 0;
        }

        #post-body h3 {
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            color: #cc44ff;
            margin: 18px 0 10px;
            line-height: 1.8;
        }

        #post-body img {
            width: 100%;
            border: 2px solid #8a2be2;
            image-rendering: pixelated;
            margin: 12px 0 4px;
            display: block;
        }

        #post-body ul,
        #post-body ol {
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: #c0a8d8;
            padding-left: 20px;
            margin: 0 0 12px 0;
        }

        #post-body blockquote {
            border-left: 3px solid #8a2be2;
            padding: 6px 14px;
            background: #1a0030;
            color: #aaa;
            font-style: italic;
            margin: 12px 0;
            font-family: 'VT323', monospace;
            font-size: 18px;
        }

        #post-body pre {
            background: #0a0018;
            border: 1px solid #8a2be2;
            padding: 12px;
            font-size: 11px;
            overflow-x: auto;
            white-space: pre-wrap;
            color: #00ff00;
            margin: 12px 0;
        }

        #post-body hr {
            border: none;
            border-top: 2px solid #8a2be2;
            margin: 18px 0;
        }

        /* Prev / Next navigation */
        #post-nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 18px;
        }

        .post-nav-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            background: #0f0025;
            border: 2px solid #3a0060;
            color: #8a2be2;
            padding: 8px 12px;
            text-decoration: none;
            display: inline-block;
            line-height: 1.7;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            max-width: 46%;
            word-break: break-word;
        }

        .post-nav-btn:hover {
            background: #8a2be2;
            border-color: #cc44ff;
            color: #fff;
        }

        .post-nav-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .post-nav-label {
            display: block;
            color: #444;
            font-size: 6px;
            margin-bottom: 5px;
        }

        /* Back to devlog link */
        #back-to-devlog {
            display: inline-block;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #8a2be2;
            text-decoration: none;
            border: 2px solid #3a0060;
            padding: 7px 12px;
            margin-bottom: 18px;
            background: #0f0025;
        }

        #back-to-devlog:hover {
            background: #8a2be2;
            color: #fff;
            border-color: #cc44ff;
        }

        /* Not found / error state */
        #post-error {
            display: none;
            background: #1a0010;
            border: 2px solid #cc0000;
            padding: 20px;
            text-align: center;
        }

        #post-error p {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #cc0000;
            line-height: 2;
        }

        /* Loading state */
        #post-loading {
            font-family: 'VT323', monospace;
            font-size: 20px;
            color: #664488;
            padding: 20px 0;
        }

        /* Section heading matches other pages */
        .post-section-heading {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #e0d0ff;
            border-bottom: 2px solid #8a2be2;
            padding-bottom: 8px;
            margin: 0 0 14px 0;
        }
    </style>

            <!-- Loading state -->
            <p id="post-loading" data-i18n="loading">&#9760; Loading...</p>

            <!-- Error state -->
            <div id="post-error">

        <!-- END CONTENT -->

</div><!-- /#wrapper -->

<a href="#top" id="back-to-top" title="Back to top">&#9650;</a>

<!-- Component Loader -->
<script>
function loadComponent(id, file, callback) {
    fetch(file)
        .then(function(r) { return r.text(); })
        .then(function(html) {
            document.getElementById(id).innerHTML = html;
            if (callback) callback();
        });
}

loadComponent('header-placeholder',  'components/header.html');
loadComponent('sidebar-placeholder', 'components/sidebar.html');
loadComponent('footer-placeholder',  'components/footer.html', function() {
    initI18n();
});
</script>

            if (m) m.classList.toggle("active", l === lang);
        });

<!-- Post loader -->
<script>
(function () {

    function getLang() {
        return document.documentElement.lang === 'es' ? 'es' : 'en';
    }

    function t(post, field) {
        var lang = getLang();
        if (post[field + '_' + lang] !== undefined) return post[field + '_' + lang];
        if (post[field + '_en']      !== undefined) return post[field + '_en'];
        if (post[field]              !== undefined) return post[field];
        return '';
    }

    function renderPost(post, allPosts, lang) {
        lang = lang || getLang();

        // Page title
        document.title = 'ZombieByte | ' + t(post, 'title');

        // Hero image
        var hero = document.getElementById('post-hero');
        hero.src = post.thumbnail || '/assets/images/default_thumbnail.jpg';
        hero.alt = t(post, 'title');

        // Title
        document.getElementById('post-title').textContent = t(post, 'title');

        // Date
        document.getElementById('post-date').textContent =
            lang === 'es' ? (post.date_es || post.date_en || post.date)
                           : (post.date_en || post.date);

        // Tags
        var tagsEl = document.getElementById('post-tags');
        tagsEl.innerHTML = (post.tags || []).map(function(tag) {
            return '<span class="post-tag">' + tag + '</span>';
        }).join('');

        // Body content
        var contentArr = post['content_' + lang] || post.content_en || [];
        var bodyHtml = contentArr.map(function(item) {
            // Raw HTML items (start with <)
            if (typeof item === 'string' && item.trim().charAt(0) === '<') {
                return item;
            }
            return '<p>' + item + '</p>';
        }).join('');
        document.getElementById('post-body').innerHTML = bodyHtml || '<p style="color:#664488;font-family:VT323,monospace;font-size:18px;">No content yet.</p>';

        // Prev / Next navigation
        var idx = allPosts.findIndex(function(p) { return p.id === post.id; });
        // allPosts is newest-first, so "previous" = older = higher index
        var prevPost = allPosts[idx + 1] || null;
        var nextPost = allPosts[idx - 1] || null;

        var prevBtn = document.getElementById('nav-prev');
        var nextBtn = document.getElementById('nav-next');

        if (prevPost) {
            prevBtn.href = 'post.html?id=' + prevPost.id;
            prevBtn.classList.remove('disabled');
            document.getElementById('nav-prev-title').textContent = t(prevPost, 'title');
        } else {
            prevBtn.classList.add('disabled');
            document.getElementById('nav-prev-title').textContent = '';
        }

        if (nextPost) {
            nextBtn.href = 'post.html?id=' + nextPost.id;
            nextBtn.classList.remove('disabled');
            document.getElementById('nav-next-title').textContent = t(nextPost, 'title');
        } else {
            nextBtn.classList.add('disabled');
            document.getElementById('nav-next-title').textContent = '';
        }

        // Show the post, hide loading
        document.getElementById('post-loading').style.display  = 'none';
        document.getElementById('post-container').style.display = 'block';
    }

    // Expose for language switcher
    window.renderPost = renderPost;

    document.addEventListener('DOMContentLoaded', function () {
        // Get post ID from URL ?id=slug
        var params  = new URLSearchParams(window.location.search);
        var postId  = params.get('id');

        if (!postId) {
            document.getElementById('post-loading').style.display = 'none';
            document.getElementById('post-error').style.display   = 'block';
            return;
        }

        fetch('posts.json?v=' + Date.now())
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var allPosts = (data.posts || []).sort(function(a, b) {
                    return new Date(b.date) - new Date(a.date);
                });
                var post = allPosts.find(function(p) { return p.id === postId; });

                if (!post) {
                    document.getElementById('post-loading').style.display = 'none';
                    document.getElementById('post-error').style.display   = 'block';
                    return;
                }

                // Store globally so language switcher can re-render
                window._currentPost = post;
                window._allPosts    = allPosts;

                renderPost(post, allPosts);
            })
            .catch(function() {
                document.getElementById('post-loading').style.display = 'none';
                document.getElementById('post-error').style.display   = 'block';
            });
    });

}());
</script>

}
